name: Scrape Combustibles RD

on:
  schedule:
    # Every Monday at 2pm UTC (10am Santo Domingo time, hours after MICM publishes)
    - cron: '0 14 * * 1'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Solo scrapeé, no guardes (dry run)'
        required: false
        default: 'false'

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run scraper
        run: npm run scrape:combustibles

      - name: Commit updated data
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config --global user.name  'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/combustibles.json data/combustibles-history.json
          git diff --staged --quiet || \
            git commit -m "data: update combustibles prices $(date +'%Y-%m-%d') [skip ci]"
          git push
