name: Scrape UASD y sync a WordPress

on:
  schedule:
    - cron: "0 6 * * *" # Diario a las 6:00 UTC (2:00 AM hora RD)
  workflow_dispatch:
    inputs:
      campus:
        description: "Campus específico para pruebas (CSA, CSN, CSSJ, CSS). Dejar vacío para todos."
        required: false
        default: ""

jobs:
  scrape-and-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Scrape UASD y publicar en WordPress
        env:
          WP_SITE_URL: ${{ secrets.WP_SITE_URL }}
          WP_USERNAME: ${{ secrets.WP_USERNAME }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
          WP_TEST_CAMPUS: ${{ github.event.inputs.campus }}
        run: node index.mjs
