name: Scrape UASD y sync a WordPress

on:
  schedule:
    - cron: "0 6 * * *" # Diario a las 6:00 UTC (2:00 AM hora RD)
  workflow_dispatch:
    inputs:
      campus:
        description: "Campus específico (CSA, CSN, CSSJ, CSS). Vacío = todos."
        required: false
        default: ""
      skip_wp:
        description: "Solo exportar JSON sin subir a WordPress"
        type: boolean
        default: false

jobs:
  scrape-and-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write # Para commitear docs/data/horarios.json

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Scrape UASD y sincronizar con WordPress
        env:
          WP_SITE_URL: ${{ secrets.WP_SITE_URL }}
          WP_USERNAME: ${{ secrets.WP_USERNAME }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
          WP_FRONTEND_URL: ${{ secrets.WP_FRONTEND_URL }}
          WP_TEST_CAMPUS: ${{ github.event.inputs.campus }}
          SKIP_WP: ${{ github.event.inputs.skip_wp == 'true' && '1' || '' }}
        run: node index.mjs

      - name: Commitear datos del frontend (horarios.json)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/horarios.json
          if git diff --staged --quiet; then
            echo "Sin cambios en horarios.json, nada que commitear."
          else
            git commit -m "chore: actualizar datos de horarios UASD [skip ci]"
            git push
          fi
