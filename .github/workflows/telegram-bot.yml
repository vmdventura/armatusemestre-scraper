name: Telegram News Bot

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['src/**', 'package.json']
  schedule:
    # Reinicia cada 5 horas para no superar el límite de 6h de GitHub Actions
    - cron: '0 */5 * * *'

# Cancela el run anterior automáticamente cuando hay un nuevo push o reinicio
concurrency:
  group: telegram-bot
  cancel-in-progress: true

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm install

      - name: Ejecutar bot (5h 40min máximo)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ALLOWED_USERS: ${{ secrets.TELEGRAM_ALLOWED_USERS }}
          WORDPRESS_URL: ${{ secrets.WORDPRESS_URL }}
          WORDPRESS_USERNAME: ${{ secrets.WORDPRESS_USERNAME }}
          WORDPRESS_APP_PASSWORD: ${{ secrets.WORDPRESS_APP_PASSWORD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          echo "Bot iniciando en $(date)"
          timeout 20400 node src/bot.js || true
          echo "Bot detenido a las $(date) — próximo reinicio en horario programado"
