<!-- ============================================================
  CARTELERA CARIBBEAN CINEMAS — Widget para WordPress
  Pegar en: Bloque "HTML personalizado" o en un shortcode [html]

  Fuente de datos (se actualiza sola 3x al día):
  https://raw.githubusercontent.com/vmdventura/armatusemestre-scraper/main/data/billboard.json
  ============================================================ -->

<div id="rdparty-cartelera"></div>

<style>
#rdparty-cartelera{--cc-bg:#111113;--cc-card:#1a1a1f;--cc-border:rgba(255,255,255,.08);--cc-accent:#e63946;--cc-gold:#ffd700;--cc-text:#f0f0f5;--cc-muted:#888899;--cc-radius:10px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--cc-text);background:var(--cc-bg);border-radius:16px;padding:24px;margin:0 auto}
#rdparty-cartelera *{box-sizing:border-box;margin:0;padding:0}
.cc-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.cc-title{font-size:20px;font-weight:800;letter-spacing:-.3px}
.cc-title span{color:var(--cc-accent)}
.cc-badge{font-size:11px;color:var(--cc-muted);background:rgba(255,255,255,.05);border:1px solid var(--cc-border);border-radius:20px;padding:4px 10px;display:flex;align-items:center;gap:6px}
.cc-dot{width:6px;height:6px;background:#22c55e;border-radius:50%;animation:ccPulse 2s infinite}
@keyframes ccPulse{0%,100%{opacity:1}50%{opacity:.25}}
.cc-filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px}
.cc-chip{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--cc-border);background:rgba(255,255,255,.04);color:var(--cc-muted);transition:all .15s;white-space:nowrap}
.cc-chip:hover,.cc-chip.on{background:var(--cc-accent);border-color:var(--cc-accent);color:#fff}
.cc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:16px}
.cc-card{background:var(--cc-card);border-radius:var(--cc-radius);overflow:hidden;border:1px solid var(--cc-border);transition:transform .2s,box-shadow .2s,border-color .2s;cursor:pointer}
.cc-card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.5);border-color:rgba(230,57,70,.35)}
.cc-poster{position:relative;aspect-ratio:2/3;background:rgba(255,255,255,.05);overflow:hidden}
.cc-poster img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .3s}
.cc-poster-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:36px;background:linear-gradient(135deg,#1a001f,#0a001a)}
.cc-card:hover .cc-poster img{transform:scale(1.04)}
.cc-poster-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.9) 0%,transparent 55%);opacity:0;transition:opacity .2s;display:flex;align-items:flex-end;padding:12px}
.cc-card:hover .cc-poster-overlay{opacity:1}
.cc-btn-tickets{width:100%;background:var(--cc-accent);color:#fff;border:none;border-radius:7px;padding:8px;font-size:12px;font-weight:700;cursor:pointer;letter-spacing:.2px}
.cc-rating{position:absolute;top:8px;left:8px;background:rgba(0,0,0,.75);border:1px solid rgba(255,255,255,.15);border-radius:5px;padding:2px 6px;font-size:10px;font-weight:700;color:var(--cc-gold)}
.cc-fmts{position:absolute;top:8px;right:8px;display:flex;flex-direction:column;gap:3px;align-items:flex-end}
.cc-fmt{background:rgba(0,0,0,.8);border:1px solid rgba(255,255,255,.2);border-radius:4px;padding:2px 5px;font-size:9px;font-weight:800;color:#fff}
.cc-fmt.imax{border-color:#4fc3f7;color:#4fc3f7}
.cc-fmt.d3{border-color:#a78bfa;color:#a78bfa}
.cc-fmt.fdx{border-color:#34d399;color:#34d399}
.cc-body{padding:10px 12px 12px}
.cc-card-title{font-size:13px;font-weight:700;line-height:1.3;margin-bottom:5px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.cc-meta{font-size:11px;color:var(--cc-muted);margin-bottom:8px}
.cc-times{display:flex;flex-wrap:wrap;gap:4px}
.cc-time{background:rgba(255,255,255,.06);border:1px solid var(--cc-border);border-radius:5px;padding:3px 7px;font-size:10px;font-weight:600;transition:background .15s}
.cc-time:hover{background:var(--cc-accent);border-color:var(--cc-accent)}
.cc-more{font-size:10px;color:var(--cc-muted);align-self:center;padding-left:2px}
.cc-empty{text-align:center;padding:40px 20px;color:var(--cc-muted)}
.cc-loading{text-align:center;padding:40px;color:var(--cc-muted);font-size:14px}
.cc-footer{margin-top:16px;text-align:center;font-size:11px;color:var(--cc-muted)}
.cc-footer a{color:var(--cc-accent);text-decoration:none}
@media(max-width:480px){.cc-grid{grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:12px}#rdparty-cartelera{padding:16px;border-radius:12px}}
</style>

<script>
(function(){
  const ROOT = document.getElementById('rdparty-cartelera');
  const JSON_URL = 'https://raw.githubusercontent.com/vmdventura/armatusemestre-scraper/main/data/billboard.json';
  // CORS-friendly: usa jsDelivr CDN como mirror si raw.githubusercontent.com falla
  const JSON_FALLBACK = 'https://cdn.jsdelivr.net/gh/vmdventura/armatusemestre-scraper@main/data/billboard.json';

  let allMovies = [];
  let activeTheater = 'all';

  ROOT.innerHTML = '<div class="cc-loading">🎬 Cargando cartelera…</div>';

  async function fetchBillboard() {
    try {
      let res = await fetch(JSON_URL);
      if (!res.ok) res = await fetch(JSON_FALLBACK);
      return await res.json();
    } catch(e) {
      try {
        const res = await fetch(JSON_FALLBACK);
        return await res.json();
      } catch {
        return null;
      }
    }
  }

  function getTheaters(movies) {
    const set = new Set();
    movies.forEach(m => (m.theaters||[]).forEach(t => { if(t.name) set.add(t.name); }));
    return [...set];
  }

  function firstShowtimes(movie) {
    for (const t of (movie.theaters||[])) {
      for (const s of (t.showtimes||[])) {
        if (s.times && s.times.length) return s.times;
      }
    }
    return [];
  }

  function fmtClass(f) {
    f = f.toUpperCase();
    if (f.includes('IMAX')) return 'imax';
    if (f.includes('4DX') || f.includes('SCREENX') || f.includes('MX4D')) return 'fdx';
    if (f === '3D') return 'd3';
    return '';
  }

  function card(m) {
    const times = firstShowtimes(m);
    const shown = times.slice(0,3);
    const extra = times.length - 3;
    const fmts = (m.formats||[]).filter(f => f && f !== '2D').slice(0,2);

    return `<div class="cc-card" onclick="window.open('${m.link||'https://caribbeancinemas.com'}','_blank')">
      <div class="cc-poster">
        ${m.poster
          ? `<img src="${m.poster}" alt="${m.title||''}" loading="lazy" onerror="this.parentNode.querySelector('.cc-poster-placeholder')&&(this.style.display='none')">`
          : ''}
        <div class="cc-poster-placeholder" ${m.poster?'style="display:none"':''}">🎬</div>
        ${m.rating?`<div class="cc-rating">${m.rating}</div>`:''}
        ${fmts.length?`<div class="cc-fmts">${fmts.map(f=>`<span class="cc-fmt ${fmtClass(f)}">${f}</span>`).join('')}</div>`:''}
        <div class="cc-poster-overlay">
          <button class="cc-btn-tickets" onclick="event.stopPropagation();window.open('${m.link||'https://caribbeancinemas.com'}','_blank')">🎟 Comprar tickets</button>
        </div>
      </div>
      <div class="cc-body">
        <div class="cc-card-title">${m.title||'Sin título'}</div>
        <div class="cc-meta">${[m.duration?m.duration+' min':null, (m.genres||[])[0]].filter(Boolean).join(' · ')||'&nbsp;'}</div>
        <div class="cc-times">
          ${shown.map(t=>`<span class="cc-time">${t}</span>`).join('')}
          ${extra>0?`<span class="cc-more">+${extra}</span>`:''}
          ${!times.length?`<span class="cc-more">Ver horarios</span>`:''}
        </div>
      </div>
    </div>`;
  }

  function render(movies, updatedAt, theaters) {
    const date = updatedAt
      ? new Date(updatedAt).toLocaleString('es-DO',{dateStyle:'medium',timeStyle:'short'})
      : '';

    const theaterChips = theaters.map(t =>
      `<div class="cc-chip${t===activeTheater?' on':''}" data-t="${t}">${t.replace('Caribbean Cinemas ','')}</div>`
    ).join('');

    const filtered = activeTheater === 'all'
      ? movies
      : movies.filter(m => (m.theaters||[]).some(t => t.name === activeTheater));

    const cards = filtered.length
      ? filtered.map(card).join('')
      : `<div class="cc-empty">No hay películas para este teatro hoy.</div>`;

    ROOT.innerHTML = `
      <div class="cc-header">
        <div class="cc-title">🎬 Cartelera <span>RD</span></div>
        <div class="cc-badge"><span class="cc-dot"></span>Actualizado ${date}</div>
      </div>
      <div class="cc-filters">
        <div class="cc-chip${activeTheater==='all'?' on':''}" data-t="all">Todos los teatros</div>
        ${theaterChips}
      </div>
      <div class="cc-grid">${cards}</div>
      <div class="cc-footer">
        Fuente: <a href="https://caribbeancinemas.com" target="_blank">caribbeancinemas.com</a>
        · ${movies.length} películas en cartelera
      </div>`;

    ROOT.querySelectorAll('.cc-chip').forEach(c => {
      c.addEventListener('click', () => {
        activeTheater = c.dataset.t;
        render(allMovies, updatedAt, theaters);
      });
    });
  }

  fetchBillboard().then(data => {
    if (!data || !data.movies || !data.movies.length) {
      ROOT.innerHTML = `<div class="cc-empty">⚠️ No se pudo cargar la cartelera. <a href="https://caribbeancinemas.com" style="color:#e63946">Ver en caribbeancinemas.com</a></div>`;
      return;
    }
    allMovies = data.movies;
    render(allMovies, data.updated_at, getTheaters(allMovies));
  }).catch(() => {
    ROOT.innerHTML = `<div class="cc-empty">⚠️ Sin conexión. <a href="https://caribbeancinemas.com" style="color:#e63946">Ver en caribbeancinemas.com</a></div>`;
  });
})();
</script>
